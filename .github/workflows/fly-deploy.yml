# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    # Deploy only when a commit is tagged as a release candidate, e.g.
    #   git tag v1.0.0-rc.1 <commit-sha>   # pin the commit as an RC
    #   git push origin v1.0.0-rc.1        # this push triggers the deploy
    # Plain pushes to master no longer deploy.
    tags:
      - 'v*-rc*'
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
